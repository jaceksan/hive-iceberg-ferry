services:

  # --- PostgreSQL: separate instance per Hive version (incompatible schemas) ---

  postgres:
    image: postgres:16-alpine
    profiles: [hive3]
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-hive3:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 5s
      retries: 5

  postgres-v4:
    image: postgres:16-alpine
    profiles: [hive4]
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-hive4:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 5s
      retries: 5

  # --- Hive Metastore: pick one profile (hive3 or hive4) ---

  hive-metastore:
    image: apache/hive:3.1.3
    profiles: [hive3]
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    volumes:
      - ./docker/hive/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./docker/hive/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./docker/hive/lib/postgresql-42.7.4.jar:/opt/hive/lib/postgresql-42.7.4.jar
      - ./docker/hive/lib/hadoop-aws-3.1.0.jar:/opt/hive/lib/hadoop-aws-3.1.0.jar
      - ./docker/hive/lib/aws-java-sdk-bundle-1.11.271.jar:/opt/hive/lib/aws-java-sdk-bundle-1.11.271.jar

  hive-metastore-v4:
    image: apache/hive:4.0.1
    profiles: [hive4]
    depends_on:
      postgres-v4:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres-v4:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    volumes:
      - ./docker/hive/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./docker/hive/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./docker/hive/lib/postgresql-42.7.4.jar:/opt/hive/lib/postgresql-42.7.4.jar

  presto:
    image: prestodb/presto:latest
    ports:
      - "8080:8080"
    volumes:
      - ./docker/presto/hive.properties:/opt/presto-server/etc/catalog/hive.properties

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh -c
    command:
      - |
        mc alias set myminio http://minio:9000 minioadmin minioadmin
        mc mb myminio/hive-warehouse --ignore-existing
        mc mb myminio/iceberg-warehouse --ignore-existing

  # Optional: Nessie catalog server (uncomment to use instead of Hadoop catalog)
  # nessie:
  #   image: ghcr.io/projectnessie/nessie:latest
  #   ports:
  #     - "19120:19120"
  #   environment:
  #     NESSIE_CATALOG_DEFAULT_WAREHOUSE: warehouse
  #     NESSIE_CATALOG_WAREHOUSES_WAREHOUSE_LOCATION: s3://iceberg-warehouse/
  #     NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT: http://minio:9000
  #     NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS: "true"
  #     NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION: us-east-1

volumes:
  postgres-data-hive3:
  postgres-data-hive4:
  minio-data:

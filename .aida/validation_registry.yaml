# AIDA validation registry
#
# Define command_id and processor_id specifications referenced by validation_policy.yaml.
version: 1
registry:
  includes: []
  commands:
    python-compile:
      argv:
        - "uv"
        - "run"
        - "python"
        - "-m"
        - "compileall"
        - "src/"
        - "scripts/"
        - "-q"
      cwd: "{workspace_root}"
      timeout_sec: 60
    yaml-lint:
      argv:
        - "uv"
        - "run"
        - "python"
        - "scripts/validate_yaml.py"
      cwd: "{workspace_root}"
      timeout_sec: 30
    docker-config:
      argv:
        - "docker"
        - "compose"
        - "config"
        - "--quiet"
      cwd: "{workspace_root}"
      timeout_sec: 30
  processors: {}
